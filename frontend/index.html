const fmtTime = (sec) => { const m=Math.floor(sec/60); const s=Math.floor(sec%60); return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; };

const timeAgo = (ts, t) => {
    const d = Date.now()-ts, m=Math.floor(d/60000), h=Math.floor(d/3600000), dy=Math.floor(d/86400000);
    if(m<1) return t('dash.justNow');
    if(m<60) return `${m} ${t('dash.mAgo')}`;
    if(h<24) return `${h} ${t('dash.hAgo')}`;
    return `${dy} ${t('dash.dAgo')}`;
};

const simpleMd = (md) => {
    if(!md) return '';
    const esc = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    const lines = md.split('\n');
    let html = '', inList = false;
    for(const raw of lines){
        const line = raw.trimEnd();
        if(!line){ if(inList){ html+='</ul>'; inList=false; } html+='<br/>'; continue; }
        const bold = (s) => s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
        if(line.startsWith('### ')){ if(inList){html+='</ul>';inList=false;} html+=`<h4 class="text-base font-headline font-bold mt-4 mb-1">${bold(esc(line.slice(4)))}</h4>`; }
        else if(line.startsWith('## ')){ if(inList){html+='</ul>';inList=false;} html+=`<h3 class="text-lg font-headline font-bold mt-5 mb-2">${bold(esc(line.slice(3)))}</h3>`; }
        else if(line.startsWith('# ')){ if(inList){html+='</ul>';inList=false;} html+=`<h2 class="text-xl font-headline font-bold mt-6 mb-2">${bold(esc(line.slice(2)))}</h2>`; }
        else if(/^[-*] /.test(line)){ if(!inList){html+='<ul class="space-y-1 my-2">'; inList=true;} html+=`<li class="flex gap-2 text-sm text-on-surface"><span class="text-tertiary mt-0.5">•</span><span>${bold(esc(line.slice(2)))}</span></li>`; }
        else { if(inList){html+='</ul>';inList=false;} html+=`<p class="text-sm text-on-surface-variant leading-relaxed mb-1">${bold(esc(line))}</p>`; }
    }
    if(inList) html+='</ul>';
    return html;
};

/* ═══════════════ hooks ═══════════════ */
const useApi = () => {
    const processVideoSSE = async (file, options={}, onProgress, signal) => {
        const fd = new FormData();
        fd.append("file", file);
        if(options.exportToLark) fd.append("export_to_lark","true");
        if(options.title) fd.append("title", options.title);
        if(options.folderToken) fd.append("folder_token", options.folderToken); // kept for future use
        if(options.deepseekApiKey) fd.append("deepseek_api_key", options.deepseekApiKey);
        if(options.sttModel) fd.append("stt_model", options.sttModel);
        if(options.larkAppId) fd.append("lark_app_id", options.larkAppId);
        if(options.larkAppSecret) fd.append("lark_app_secret", options.larkAppSecret);
        const r = await fetch(`${API_BASE}/process`,{method:"POST",body:fd,signal});
        if(!r.ok){ const e = await r.json().catch(()=>({})); throw new Error(e.detail||`HTTP ${r.status}`); }
        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buf = '', result = null;
        while(true){
            const {value,done} = await reader.read();
            if(done) break;
            buf += decoder.decode(value,{stream:true});
            const parts = buf.split('\n\n');
            buf = parts.pop() || '';
            for(const part of parts){
                const dl = part.split('\n').find(l=>l.startsWith('data: '));
                if(!dl) continue;
                try{
                    const data = JSON.parse(dl.slice(6));
                    if(data.stage==='done'){ result=data.result; onProgress?.({stage:'done',progress:100}); }
                    else if(data.stage==='error'){ throw new Error(data.error||'Processing failed'); }
                    else { onProgress?.(data); }
                }catch(pe){ if(pe.message && !pe.message.startsWith('Unexpected')) throw pe; }
            }
        }
        if(!result) throw new Error('No result received from server');
        return result;
    };
    const checkHealth = async () => { try{ return (await fetch(`${API_BASE}/health`)).ok; }catch(_){return false;} };
    return {processVideoSSE, checkHealth};
};

const useSettings = () => {

    return {loadSettings, saveSettings};
};

const Dashboard = () => {
    const {t} = useI18n();
    const {history, addToHistory, currentJob, setCurrentJob, setLastResult, stats, addLarkExport} = useApp();
    const [uploadError, setUploadError] = useState(null);
    const [processingResult, setProcessingResult] = useState(null);
    const fileInputRef = useRef(null);
    const {processVideoSSE, checkHealth} = useApi();
    const {loadSettings} = useSettings();
    const navigate = useNavigate();
    const abortRef = useRef(null);

    useEffect(() => { checkHealth(); }, []);

    const handleCancel = () => {
        if(abortRef.current){ abortRef.current.abort(); abortRef.current=null; }
        setCurrentJob(null);
    };

    const handleFileSelect = async (e) => {
        const file = e.target.files?.[0];
        if(!file) return;
        if(fileInputRef.current) fileInputRef.current.value = '';
        const validExts = /\.(mp4|mov|avi|mkv|wmv|flv|webm|m4v|mp3|wav|flac|aac|ogg|m4a|wma|opus)$/i;
        if(!validExts.test(file.name)){
            setUploadError(t('dash.fileError')); return;
        }
        setUploadError(null);
        setProcessingResult(null);

        const ac = new AbortController();
        abortRef.current = ac;
        setCurrentJob({fileName:file.name, stage:'upload', progress:2});

        try {
            const settings = loadSettings();
            const result = await processVideoSSE(file, {
                exportToLark: settings.exportToLark||false,
                title: file.name.replace(/\.[^/.]+$/,""),
                deepseekApiKey: settings.deepseekApiKey||null,
                sttModel: settings.sttModel||null,
                larkAppId: settings.larkAppId||null,
                larkAppSecret: settings.larkAppSecret||null,
            }, (ev) => {
                setCurrentJob(prev => prev ? {...prev, stage:ev.stage, progress:ev.progress} : null);
            }, ac.signal);

            abortRef.current = null;
            setCurrentJob({fileName:file.name, stage:'done', progress:100});
            setLastResult(result);
            setProcessingResult(result);

            const durSec = result.audio_duration_seconds || 0;
            const larkUrl = result.lark_response?.url || null;
            addToHistory({
                id: Date.now(), name: file.name, timestamp: Date.now(),
                durationMin: Math.round(durSec/60*10)/10,
                status:'completed',
                transcriptText: result.transcript_text||result.transcript_text_preview||'',
                segments: result.segments||[],
                summary: result.summary_markdown||'',
                larkUrl,
                larkError: result.lark_error||null,
                audioDurationSec: durSec,
            });
            if(larkUrl) addLarkExport({url:larkUrl, title:file.name, timestamp:Date.now()});
            setTimeout(() => setCurrentJob(null), 3000);
        } catch(err) {
            abortRef.current = null;
            setCurrentJob(null);
            if(err.name !== 'AbortError'){
                setUploadError(err.message || "Processing failed.");
                addToHistory({id:Date.now(), name:file.name, timestamp:Date.now(), durationMin:0, status:'failed'});
            }
        }

            fileInputRef.current.files = dt.files;
            handleFileSelect({target:fileInputRef.current});
        }

/* ═══════════════ Editor ═══════════════ */
const Editor = () => {
    const {t} = useI18n();
    const {lastResult, setLastResult, history, addLarkExport} = useApp();
    const {loadSettings} = useSettings();
    const [exporting, setExporting] = useState(false);
    const [regenerating, setRegenerating] = useState(false);
    const [toast, setToast] = useState(null);
    const [larkUrl, setLarkUrl] = useState(null);

    const result = lastResult || (history.length > 0 && history.find(h => h.status==='completed') ? (() => {
        const h = history.find(h=>h.status==='completed');
        return {transcript_text:h.transcriptText, segments:h.segments, summary_markdown:h.summary, filename:h.name, audio_duration_seconds:h.audioDurationSec};
    })() : null);

    const showToast = (msg, ok=true) => { setToast({msg,ok}); setTimeout(()=>setToast(null), 3000); };

    const handleExportLark = async () => {
        if(!result || exporting) return;
        setExporting(true);
        try {
            const settings = loadSettings();
            const fd = new FormData();
            fd.append('markdown', result.summary_markdown||'');
            fd.append('title', result.filename || 'FluentFlow Export');
            if(settings.larkAppId) fd.append('lark_app_id', settings.larkAppId);
            if(settings.larkAppSecret) fd.append('lark_app_secret', settings.larkAppSecret);
            const r = await fetch(`${API_BASE}/export-lark`, {method:'POST', body:fd});
            if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail||'Export failed');
            const data = await r.json();
            const exportUrl = data.url || null;
            setLarkUrl(exportUrl);
            if(exportUrl) addLarkExport({url:exportUrl, title:result.filename||'Export', timestamp:Date.now()});
            showToast(t('edit.exportDone'));
        } catch(err) { showToast(t('edit.exportFail')+': '+err.message, false); }
        finally { setExporting(false); }
    };

    const handleRegenerate = async () => {
        if(!result?.transcript_text || regenerating) return;
        setRegenerating(true);
        try {
            const settings = loadSettings();
            const fd = new FormData();
            fd.append('transcript', result.transcript_text);
            if(settings.deepseekApiKey) fd.append('deepseek_api_key', settings.deepseekApiKey);
            const r = await fetch(`${API_BASE}/regenerate-summary`, {method:'POST', body:fd});
            if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail||'Regeneration failed');
            const data = await r.json();
            setLastResult({...result, summary_markdown: data.summary_markdown});
            showToast(t('edit.regenDone'));
        } catch(err) { showToast(err.message, false); }
        finally { setRegenerating(false); }
    };

    if(!result) return (
        <div className="ml-64 min-h-screen relative pb-8">
            <TopNav/>
            <main className="flex items-center justify-center h-[calc(100vh-4rem)]">
                <div className="text-center">
                    <span className="material-symbols-outlined text-6xl text-slate-300 mb-4">edit_note</span>
                    <h2 className="font-headline text-2xl font-bold text-on-surface mb-2">{t('edit.noResult')}</h2>
                    <p className="text-on-surface-variant mb-6">{t('edit.noResultDesc')}</p>
                    <Link to="/" className="inline-flex items-center gap-2 px-6 py-3 bg-primary text-white font-bold rounded-sm hover:bg-primary-container transition-colors">
                        <span className="material-symbols-outlined">upload_file</span>{t('dash.selectFile')}
                    </Link>
                </div>
            </main>
            <StatusBar/>
        </div>
    );

    const segments = result.segments||[];
    const transcript = result.transcript_text || '';
    const summary = result.summary_markdown || '';
    const durSec = result.audio_duration_seconds || 0;

    return (
    <div className="ml-64 min-h-screen relative pb-8">
        <TopNav/>
        {toast && (
            <div className={`fixed top-20 right-8 z-50 px-5 py-3 rounded-lg shadow-lg text-sm font-medium animate-pulse ${toast.ok?'bg-green-500 text-white':'bg-red-500 text-white'}`}>
                {toast.msg}
            </div>
        )}
        {larkUrl && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 bg-white shadow-xl border border-green-200 rounded-xl px-6 py-4 flex items-center gap-4 max-w-lg">
                <span className="material-symbols-outlined text-green-500 text-2xl" style={{fontVariationSettings:"'FILL' 1"}}>check_circle</span>
                <div className="flex-1 min-w-0">
                    <p className="text-sm font-bold text-on-surface">{t('edit.exportDone')}</p>
                    <a href={larkUrl} target="_blank" rel="noopener noreferrer" className="text-primary text-sm hover:underline truncate block">{larkUrl}</a>
                </div>
                <button onClick={()=>setLarkUrl(null)} className="text-slate-400 hover:text-slate-600 flex-shrink-0">
                    <span className="material-symbols-outlined text-sm">close</span>
                </button>
            </div>
        )}
        <main className="pt-6 pb-12 px-8 h-[calc(100vh-4rem-2rem)] overflow-hidden">
            <div className="max-w-7xl mx-auto h-full flex flex-col gap-6">
                <div className="flex justify-between items-end">
                    <div>
                        <h1 className="text-3xl font-extrabold font-headline tracking-tight text-on-surface">{result.filename || t('edit.title')}</h1>
                        <p className="text-on-surface-variant mt-1">
                            {durSec > 0 && <>{t('edit.duration')}: {fmtTime(durSec)} &bull; </>}
                            {segments.length > 0 && <>{segments.length} {t('edit.segments')} &bull; </>}
                            <span className="text-tertiary font-semibold uppercase tracking-wider text-[10px]">{t('edit.confidence')}</span>
                        </p>
                    </div>
                    <div className="flex gap-3">
                        <button onClick={handleRegenerate} disabled={regenerating||!transcript} className="flex items-center gap-2 px-4 py-2 bg-tertiary/10 text-tertiary font-semibold text-sm rounded-lg hover:bg-tertiary/20 transition disabled:opacity-40">
                            <span className={`material-symbols-outlined text-sm ${regenerating?'animate-spin':''}`}>{regenerating?'sync':'refresh'}</span>
                            {t('edit.regenerate')}
                        </button>
                        <button onClick={handleExportLark} disabled={exporting||!summary} className="flex items-center gap-2 px-4 py-2 bg-primary text-white font-semibold text-sm rounded-lg hover:bg-primary-container transition disabled:opacity-40">
                            <span className={`material-symbols-outlined text-sm ${exporting?'animate-spin':''}`}>{exporting?'sync':'cloud_upload'}</span>
                            {t('edit.export')}
                        </button>
                    </div>
                </div>

                <div className="flex-grow flex gap-4 overflow-hidden">
                    <section className="flex-1 bg-surface-container-low rounded-sm flex flex-col overflow-hidden">
                        <div className="p-5 flex justify-between items-center border-b border-surface-container-highest">
                            <h2 className="font-headline font-bold text-lg flex items-center gap-2">
                                <span className="material-symbols-outlined text-primary">subject</span>
                                {t('edit.transcript')}
                            </h2>
                            <span className="px-3 py-1 bg-white/50 rounded-full text-xs font-medium text-slate-500">faster-whisper</span>
                        </div>
                        <div className="flex-grow overflow-y-auto p-6 space-y-4 hide-scrollbar">
                            {segments.length > 0 ? segments.map((seg,i) => (
                                <div key={i} className="flex gap-4 group">
                                    <span className="text-xs font-mono text-slate-400 pt-1 w-14 flex-shrink-0">{fmtTime(seg.start)}</span>
                                    <p className="text-on-surface text-sm leading-relaxed">{seg.text}</p>
                                </div>
                            )) : (
                                <p className="text-on-surface text-sm leading-relaxed whitespace-pre-wrap">{transcript}</p>
                            )}
                        </div>
                    </section>

                    <section className="flex-1 bg-surface-container-lowest rounded-sm flex flex-col shadow-sm overflow-hidden">
                        <div className="p-5 flex justify-between items-center bg-tertiary/5 border-b border-surface-container-highest">
                            <h2 className="font-headline font-bold text-lg flex items-center gap-2">
                                <span className="material-symbols-outlined text-tertiary">psychology</span>
                                {t('edit.aiSummary')}
                            </h2>
                        </div>
                        <div className="flex-grow overflow-y-auto p-8 hide-scrollbar">
                            {summary ? (
                                <div dangerouslySetInnerHTML={{__html: simpleMd(summary)}}></div>
                            ) : (
                                <p className="text-on-surface-variant text-sm italic">No summary available.</p>
                            )}
                        </div>
                        <div className="p-4 bg-tertiary-fixed border-t border-tertiary/20 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <span className="material-symbols-outlined text-tertiary text-sm" style={{fontVariationSettings:"'FILL' 1"}}>verified</span>
                                <span className="text-[10px] font-bold text-on-tertiary-fixed-variant uppercase tracking-widest">{t('edit.confidence')}</span>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
        <StatusBar/>
    </div>
    );
};

    const [saved,setSaved] = useState(false);
    const [cleared,setCleared] = useState(false);

    const isDark = settings.theme === 'dark';
    const applyTheme = (theme) => {
        setSettings(s=>({...s, theme}));
        document.documentElement.classList.toggle('dark', theme==='dark');
    };
    useEffect(() => { document.documentElement.classList.toggle('dark', isDark); }, []);

    const handleSave = () => { saveSettings(settings); setSaved(true); setTimeout(()=>setSaved(false),2000); };
    const handleClear = () => { clearHistory(); setCleared(true); setTimeout(()=>setCleared(false),2000); };

    return (
    <div className="ml-64 min-h-screen relative pb-8">
        <TopNav/>
        <main className="p-12 max-w-6xl mx-auto h-[calc(100vh-4rem-2rem)] overflow-y-auto hide-scrollbar">
            <header className="mb-12">
                <h1 className="text-4xl font-extrabold tracking-tight text-on-surface mb-2 font-headline">{t('set.title')}</h1>
                <p className="text-on-surface-variant font-medium">{t('set.subtitle')}</p>
            </header>
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                <div className="lg:col-span-8 space-y-8">
                    <section className="bg-surface-container-lowest rounded-sm p-8 shadow-sm">
                        <div className="flex items-center gap-4 mb-8">
                            <div className="w-12 h-12 rounded-sm bg-blue-50 flex items-center justify-center text-primary">
                                <span className="material-symbols-outlined text-3xl">sync_alt</span>
                            </div>
                            <div>
                                <h2 className="text-xl font-bold tracking-tight font-headline">{t('set.larkTitle')}</h2>
                                <p className="text-sm text-on-surface-variant">{t('set.larkDesc')}</p>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="space-y-2">
                                <label className="text-xs font-bold uppercase tracking-wider text-on-surface-variant">App ID</label>
                                <input className="w-full bg-surface-container-low border-none rounded-sm px-4 py-3 focus:ring-2 focus:ring-primary/20 text-sm" placeholder="cli_a1b2c3d4e5" value={settings.larkAppId||""} onChange={e=>setSettings(s=>({...s,larkAppId:e.target.value}))}/>
                            </div>
                            <div className="space-y-2">
                                <label className="text-xs font-bold uppercase tracking-wider text-on-surface-variant">App Secret</label>
                                <input className="w-full bg-surface-container-low border-none rounded-sm px-4 py-3 focus:ring-2 focus:ring-primary/20 text-sm" placeholder="••••••••••••••••" type="password" value={settings.larkAppSecret||""} onChange={e=>setSettings(s=>({...s,larkAppSecret:e.target.value}))}/>
                            </div>
                            <div className="md:col-span-2 flex items-center gap-3">
                                <input type="checkbox" id="exportToLark" checked={settings.exportToLark||false} onChange={e=>setSettings(s=>({...s,exportToLark:e.target.checked}))} className="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary"/>
                                <label htmlFor="exportToLark" className="text-sm text-on-surface">{t('set.autoExport')}</label>
                            </div>
                        </div>
                    </section>
                    {larkExports.length > 0 && (
                    <section className="bg-surface-container-lowest rounded-sm p-8 shadow-sm">
                        <div className="flex items-center gap-4 mb-6">
                            <div className="w-10 h-10 rounded-sm bg-green-50 flex items-center justify-center text-green-600">
                                <span className="material-symbols-outlined">history</span>
                            </div>
                            <div>
                                <h2 className="text-lg font-bold tracking-tight font-headline">{t('set.larkHistory')}</h2>
                                <p className="text-xs text-on-surface-variant">{larkExports.length} {t('dash.docUnit')}</p>
                            </div>
                        </div>
                        <div className="space-y-3 max-h-64 overflow-y-auto hide-scrollbar">
                            {larkExports.map((ex,i) => (
                                <a key={i} href={ex.url} target="_blank" rel="noopener noreferrer" className="flex items-center gap-4 p-4 rounded-lg bg-surface-container-low hover:bg-blue-50 transition group">
                                    <span className="material-symbols-outlined text-primary text-lg" style={{fontVariationSettings:"'FILL' 1"}}>description</span>
                                    <div className="flex-1 min-w-0">
                                        <p className="text-sm font-semibold text-on-surface truncate group-hover:text-primary">{ex.title}</p>
                                        <p className="text-[10px] text-slate-400">{timeAgo(ex.timestamp, t)}</p>
                                    </div>
                                    <span className="material-symbols-outlined text-slate-300 group-hover:text-primary text-sm">open_in_new</span>
                                </a>
                            ))}
                        </div>
                    </section>
                    )}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <section className="bg-surface-container-lowest rounded-sm p-8 shadow-sm">
                            <div className="flex items-center gap-3 mb-6">
                                <span className="material-symbols-outlined text-tertiary">mic_external_on</span>
                                <h2 className="text-lg font-bold font-headline">{t('set.sttModel')}</h2>
                            </div>
                            <div className="space-y-2">
                                <label className="text-xs font-bold uppercase tracking-wider text-on-surface-variant">{t('set.modelSel')}</label>
                                <select className="w-full bg-surface-container-low border-none rounded-sm px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20" value={settings.sttModel||"small"} onChange={e=>setSettings(s=>({...s,sttModel:e.target.value}))}>
                                    <option value="tiny">{t('set.optTiny')}</option>
                                    <option value="base">{t('set.optBase')}</option>
                                    <option value="small">{t('set.optSmall')}</option>
                                    <option value="medium">{t('set.optMedium')}</option>
                                    <option value="large-v3">{t('set.optLarge')}</option>
                                </select>
                            </div>
                        </section>
                        <section className="bg-surface-container-lowest rounded-sm p-8 shadow-sm">
                            <div className="flex items-center gap-3 mb-6">
                                <span className="material-symbols-outlined text-tertiary">psychology</span>
                                <h2 className="text-lg font-bold font-headline">{t('set.intelligence')}</h2>
                            </div>
                            <div className="space-y-6">
                                <div className="space-y-2">
                                    <label className="text-xs font-bold uppercase tracking-wider text-on-surface-variant">{t('set.provider')}</label>
                                    <select className="w-full bg-surface-container-low border-none rounded-sm px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20" value="deepseek" disabled title="Only DeepSeek is currently supported">
                                        <option value="deepseek">DeepSeek</option>
                                    </select>
                                    <p className="text-[10px] text-slate-400">OpenAI / Claude support coming soon</p>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs font-bold uppercase tracking-wider text-on-surface-variant">API Key</label>
                                    <input className="w-full bg-surface-container-low border-none rounded-sm px-4 py-3 focus:ring-2 focus:ring-primary/20 text-sm" placeholder="sk-••••••••" type="password" value={settings.deepseekApiKey||""} onChange={e=>setSettings(s=>({...s,deepseekApiKey:e.target.value}))}/>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
                <div className="lg:col-span-4 space-y-8">
                    <section className="bg-surface-container-lowest rounded-sm p-8 shadow-sm">
                        <h2 className="text-lg font-bold mb-6 font-headline">{t('set.prefs')}</h2>
                        <div className="space-y-8">
                            <div className="space-y-3">
                                <label className="text-xs font-bold uppercase tracking-wider text-on-surface-variant">{t('set.theme')}</label>
                                <div className="grid grid-cols-2 gap-2 p-1 bg-surface-container-low rounded-sm">
                                    <button onClick={()=>applyTheme('light')} className={`flex items-center justify-center gap-2 py-2 rounded-sm text-sm font-semibold transition ${!isDark?'bg-white shadow-sm text-primary':'text-slate-500 hover:bg-white/50'}`}>
                                        <span className="material-symbols-outlined text-sm">light_mode</span>{t('set.light')}
                                    </button>
                                    <button onClick={()=>applyTheme('dark')} className={`flex items-center justify-center gap-2 py-2 rounded-sm text-sm font-semibold transition ${isDark?'bg-white shadow-sm text-primary':'text-slate-500 hover:bg-white/50'}`}>
                                        <span className="material-symbols-outlined text-sm">dark_mode</span>{t('set.dark')}
                                    </button>
                                </div>
                            </div>
                            <div className="space-y-3">
                                <label className="text-xs font-bold uppercase tracking-wider text-on-surface-variant">{t('edit.clearHistory')}</label>
                                <button onClick={handleClear} disabled={history.length===0} className="w-full py-3 px-4 bg-red-50 text-red-600 font-semibold text-sm rounded-sm hover:bg-red-100 transition disabled:opacity-30 flex items-center justify-center gap-2">
                                    <span className="material-symbols-outlined text-sm">delete_sweep</span>
                                    {cleared ? t('edit.clearConfirm') : `${t('edit.clearHistory')} (${history.length})`}
                                </button>
                            </div>
                            <div className="pt-4 border-t border-slate-100">
                                <button onClick={handleSave} className="w-full py-4 px-6 bg-primary-container text-white rounded-sm font-bold text-sm shadow-lg shadow-primary/20 hover:scale-[1.02] transition-all flex items-center justify-center gap-2">
                                    <span className="material-symbols-outlined text-sm">{saved?"check":"save"}</span>
                                    {saved ? t('set.saved') : t('set.saveAll')}
                                </button>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
        <StatusBar/>
    </div>
    );
};

/* ═══════════════ App root ═══════════════ */
const App = () => (
    <div className="flex min-h-screen w-full bg-surface">
        <SideNav/>
        <div className="flex-1 flex flex-col w-full h-full relative">
            <Routes>
                <Route path="/" element={<Dashboard/>}/>
                <Route path="/processing" element={<Processing/>}/>
                <Route path="/editor" element={<Editor/>}/>
                <Route path="/settings" element={<Settings/>}/>
            </Routes>
        </div>
    </div>
);

createRoot(document.getElementById('root')).render(
    <MemoryRouter><I18nProvider><AppProvider><App/></AppProvider></I18nProvider></MemoryRouter>
);
</script>
</body>
</html>
